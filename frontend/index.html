<!DOCTYPE html>
<html lang="en" data-theme="dark" data-lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chatting</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
</head>
<body>
    <div class="app" id="app">
        <!-- Title Bar -->
        <header class="titlebar">
            <div class="titlebar-left">
                <div class="logo" aria-label="Chatting logo">
                    <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 12c0-3.3 2.7-6 6-6h12c3.3 0 6 2.7 6 6v4c0 3.3-2.7 6-6 6h-2l-6 4v-4h-4c-3.3 0-6-2.7-6-6v-4z"/>
                        <path d="M11 12h10"/>
                        <path d="M11 16h6"/>
                    </svg>
                </div>
                <span class="title">Chatting</span>
            </div>
            <div class="titlebar-right">
                <button class="icon-btn theme-btn" id="themeToggle" title="Toggle theme" type="button">
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
                <span class="model-badge" id="modelBadge">Claude Sonnet 4</span>
            </div>
        </header>

        <div class="layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <nav class="modes">
                    <div class="sidebar-label" id="lblModes">Modes</div>
                    <button class="mode-btn active" data-mode="chat" type="button">
                        <span class="mode-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 11.5c0 2.5-1.3 4.7-3.3 6a7.5 7.5 0 0 1-4.2 1.3H7l-3 2.5v-4.5C2.5 14.7 2 13 2 11.5 2 7.4 5.4 4 9.5 4h2A7.5 7.5 0 0 1 19 7.3c1.3 1.2 2 2.7 2 4.2z"/>
                            </svg>
                        </span>
                        Chat
                    </button>
                    <button class="mode-btn" data-mode="code" type="button">
                        <span class="mode-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9.5 7.5L4.5 12l5 4.5"/>
                                <path d="M14.5 7.5l5 4.5-5 4.5"/>
                            </svg>
                        </span>
                        Code
                    </button>
                </nav>

                <!-- Conversation List -->
                <div class="conv-section">
                    <div class="conv-header">
                        <span class="sidebar-label" id="lblChats">Chats</span>
                        <div class="conv-actions">
                            <button class="conv-action-btn" id="newChatBtn" type="button" title="New chat">+</button>
                            <button class="conv-action-btn temp-btn" id="tempChatBtn" type="button" title="Temporary chat (not saved)">T</button>
                        </div>
                    </div>
                    <div class="conv-list" id="convList"></div>
                </div>

                <div class="sidebar-section settings-area">
                    <button class="settings-btn" id="settingsBtn" type="button">
                        <span class="mode-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="3"/>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.11.11a2 2 0 0 1-2.82 2.82l-.11-.11a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.11.11a2 2 0 0 1-2.82-2.82l.11-.11a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.11-.11a2 2 0 0 1 2.82-2.82l.11.11a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.11-.11a2 2 0 0 1 2.82 2.82l-.11.11a1.65 1.65 0 0 0-.33 1.82V9c.3.6.9 1 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                            </svg>
                        </span>
                        <span>Settings</span>
                        <span class="arrow">&gt;</span>
                    </button>
                    <div class="settings-panel" id="settingsPanel">
                        <div class="form-group">
                            <label for="lang">Language / 语言</label>
                            <select id="lang">
                                <option value="en">English</option>
                                <option value="zh">简体中文</option>
                                <option value="zh_tw">繁體中文</option>
                                <option value="fr">Francais</option>
                                <option value="ru">Русский</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label id="lblProvider">API Provider</label>
                            <select id="provider"></select>
                        </div>
                        <div class="form-group">
                            <label id="lblModel">Model</label>
                            <select id="model"></select>
                        </div>
                        <div class="form-group">
                            <label id="lblApiKey">API Key</label>
                            <input type="password" id="apiKey" placeholder="Enter your API key..." autocomplete="off" spellcheck="false">
                        </div>
                        <button class="save-btn" id="saveSettings" type="button">Save &amp; Verify</button>
                        <div class="conn-status" id="connStatus">
                            <span class="dot"></span>
                            <span class="conn-text">Not configured</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="content">
                <div class="messages" id="messages">
                    <div class="messages-inner" id="messagesInner"></div>
                </div>

                <div class="input-area">
                    <div class="input-row">
                        <textarea id="input" placeholder="Type your message..." rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" type="button" title="Send">
                            <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M5 12h14"/>
                                <path d="M15 8l4 4-4 4"/>
                            </svg>
                            <svg class="stop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="6" y="6" width="12" height="12" rx="2"/>
                            </svg>
                        </button>
                    </div>
                    <div class="input-footer">
                        <span id="modeIndicator">Chat mode</span>
                        <span id="modelIndicator"></span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous" defer></script>
    <script src="js/app.js"></script>
</body>
</html>
